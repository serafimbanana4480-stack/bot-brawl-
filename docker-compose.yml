version: "3.9"

services:
  brawl-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brawl-bot
    image: brawl-bot:latest
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037
      - BRAWL_BOT_API_PORT=8003
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./images:/app/images
      - ./config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - brawl-bot-net

networks:
  brawl-bot-net:
    driver: bridge
