name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: Ruff lint
        run: ruff check .
      - name: Black format check
        run: black --check .

  # ---------------------------------------------------------------------------
  # Type Check
  # ---------------------------------------------------------------------------
  typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mypy
      - name: mypy
        run: mypy .

  # ---------------------------------------------------------------------------
  # Tests (Matrix)
  # ---------------------------------------------------------------------------
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio
      - name: Run tests
        run: pytest --cov=. --cov-report=xml --cov-report=html -v
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Security Scan
  # ---------------------------------------------------------------------------
  security:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] pip-audit
      - name: Bandit scan
        continue-on-error: false
        run: bandit -r . -f json -o bandit-report.json
      - name: pip-audit scan
        continue-on-error: false
        run: pip-audit --format=json --output=pip-audit-report.json
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # ---------------------------------------------------------------------------
  # Build Docker
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -t brawl-bot:${{ github.sha }} .
          docker tag brawl-bot:${{ github.sha }} brawl-bot:latest
      - name: Image size check
        run: docker images brawl-bot:latest --format "{{.Size}}"
      - name: Save image artifact
        run: docker save brawl-bot:latest | gzip > brawl-bot-latest.tar.gz
      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: brawl-bot-latest.tar.gz

  # ---------------------------------------------------------------------------
  # Publish Models / Artifacts (on main only)
  # ---------------------------------------------------------------------------
  artifacts:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Package models (if present)
        run: |
          mkdir -p artifacts
          if (Test-Path models) { Compress-Archive -Path models -DestinationPath artifacts/models.zip -Force }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: artifacts/
